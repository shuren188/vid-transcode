services:
  - type: web
    name: vid-transcode
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt && cd frontend && npm install && npm run build
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HOST
        value: 0.0.0.0
    healthCheckPath: /api/resolutions
